<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" width="400" height="280">
  <rect width="400" height="280" fill="white"/>

  <!-- Icon: 6 curved arms, fuller and rounder -->
  <g transform="translate(200,112)" fill="none" stroke="#6b6b6b" stroke-width="3.2" stroke-linecap="round">
    <path d="M 3,-12 C 10,-22 18,-30 14,-46"/>
    <path d="M 3,-12 C 10,-22 18,-30 14,-46" transform="rotate(60)"/>
    <path d="M 3,-12 C 10,-22 18,-30 14,-46" transform="rotate(120)"/>
    <path d="M 3,-12 C 10,-22 18,-30 14,-46" transform="rotate(180)"/>
    <path d="M 3,-12 C 10,-22 18,-30 14,-46" transform="rotate(240)"/>
    <path d="M 3,-12 C 10,-22 18,-30 14,-46" transform="rotate(300)"/>
  </g>

  <!-- Wordmark: wide-tracked uppercase, light weight -->
  <text
    x="200"
    y="192"
    text-anchor="middle"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="13.5"
    font-weight="300"
    letter-spacing="5"
    fill="#6b6b6b">OPEN CAMPUS ADVISOR</text>
</svg>
